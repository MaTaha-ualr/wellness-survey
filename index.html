<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Youth Mental Wellness Survey</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   RESET & BASE
   ═══════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body {
  font-family: 'DM Sans', -apple-system, sans-serif;
  background: linear-gradient(135deg, #f0fdfa 0%, #ecfeff 40%, #f0f9ff 100%);
  min-height: 100vh;
  color: #1e293b;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
button { font-family: inherit; cursor: pointer; border: none; outline: none; }
input, textarea { font-family: inherit; outline: none; }

/* ═══════════════════════════════════════
   ANIMATIONS
   ═══════════════════════════════════════ */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeOut {
  from { opacity: 1; transform: translateY(0); }
  to { opacity: 0; transform: translateY(-16px); }
}
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
@keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
@keyframes confetti1 { 0% { transform: translate(0,0) rotate(0deg); opacity:1; } 100% { transform: translate(-60px,-180px) rotate(360deg); opacity:0; } }
@keyframes confetti2 { 0% { transform: translate(0,0) rotate(0deg); opacity:1; } 100% { transform: translate(80px,-200px) rotate(-300deg); opacity:0; } }
@keyframes confetti3 { 0% { transform: translate(0,0) rotate(0deg); opacity:1; } 100% { transform: translate(-30px,-160px) rotate(200deg); opacity:0; } }
@keyframes confetti4 { 0% { transform: translate(0,0) rotate(0deg); opacity:1; } 100% { transform: translate(50px,-190px) rotate(-260deg); opacity:0; } }

.fade-up { animation: fadeUp 0.45s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
.fade-out { animation: fadeOut 0.3s ease forwards; }

/* ═══════════════════════════════════════
   PROGRESS BAR
   ═══════════════════════════════════════ */
.progress-wrap {
  position: sticky; top: 0; z-index: 100;
  background: rgba(255,255,255,0.92); backdrop-filter: blur(12px);
  border-bottom: 1px solid #e2e8f0;
}
.progress-track { height: 4px; background: #e2e8f0; }
.progress-fill {
  height: 100%; border-radius: 0 4px 4px 0;
  background: linear-gradient(90deg, #34d399, #06b6d4);
  transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
}
.progress-info {
  display: flex; justify-content: space-between;
  padding: 8px 24px; font-size: 12px; color: #94a3b8;
}

/* ═══════════════════════════════════════
   LAYOUT
   ═══════════════════════════════════════ */
.container { max-width: 640px; margin: 0 auto; padding: 32px 20px 120px; }
@media (max-width: 480px) { .container { padding: 20px 16px 100px; } }

/* ═══════════════════════════════════════
   INTRO PAGE
   ═══════════════════════════════════════ */
.intro { text-align: center; padding-top: 48px; }
.intro-emoji { font-size: 56px; margin-bottom: 16px; }
.intro h1 {
  font-family: 'Fraunces', serif; font-size: 34px; font-weight: 700;
  color: #0f172a; line-height: 1.15; margin-bottom: 14px;
}
@media (max-width: 480px) { .intro h1 { font-size: 28px; } }
.intro .subtitle { font-size: 17px; color: #475569; line-height: 1.7; max-width: 460px; margin: 0 auto 8px; }
.intro .note { font-size: 15px; color: #94a3b8; font-style: italic; margin-bottom: 36px; }

.info-card {
  background: #fff; border-radius: 16px; padding: 24px 28px;
  text-align: left; border: 1px solid #e2e8f0; margin-bottom: 36px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.info-row { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 12px; font-size: 14px; color: #64748b; }
.info-row:last-child { margin-bottom: 0; }
.info-row strong { color: #334155; }

/* ═══════════════════════════════════════
   BUTTONS
   ═══════════════════════════════════════ */
.btn-primary {
  display: inline-block;
  background: linear-gradient(135deg, #06b6d4, #34d399);
  color: #fff; padding: 16px 44px; border-radius: 14px;
  font-size: 16px; font-weight: 600;
  box-shadow: 0 4px 16px rgba(6,182,212,0.3);
  transition: transform 0.2s, box-shadow 0.2s;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(6,182,212,0.35); }
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled {
  opacity: 0.5; cursor: not-allowed;
  transform: none !important; box-shadow: 0 4px 16px rgba(6,182,212,0.15) !important;
}

.btn-secondary {
  background: #fff; color: #64748b; padding: 14px 28px;
  border-radius: 12px; font-size: 15px; font-weight: 500;
  border: 1.5px solid #e2e8f0;
  transition: transform 0.2s, border-color 0.2s;
}
.btn-secondary:hover { border-color: #cbd5e1; transform: translateY(-1px); }

.btn-submit {
  display: inline-flex; align-items: center; gap: 8px;
  background: linear-gradient(135deg, #06b6d4, #34d399);
  color: #fff; padding: 16px 36px; border-radius: 14px;
  font-size: 16px; font-weight: 600;
  box-shadow: 0 4px 16px rgba(6,182,212,0.3);
  transition: transform 0.2s, box-shadow 0.2s;
}
.btn-submit:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(6,182,212,0.35); }
.btn-submit.loading {
  background: linear-gradient(90deg, #06b6d4, #34d399, #06b6d4);
  background-size: 200% 100%; animation: shimmer 1.5s infinite;
  pointer-events: none;
}

/* ═══════════════════════════════════════
   SECTION HEADER
   ═══════════════════════════════════════ */
.section-header { margin-bottom: 32px; }
.section-emoji { font-size: 36px; margin-bottom: 8px; }
.section-title {
  font-family: 'Fraunces', serif; font-size: 26px; font-weight: 600;
  color: #0f172a; margin-bottom: 4px;
}
.section-subtitle { font-size: 15px; color: #94a3b8; }

/* ═══════════════════════════════════════
   QUESTION CARD
   ═══════════════════════════════════════ */
.q-card {
  background: #fff; border-radius: 16px; padding: 28px;
  margin-bottom: 20px; border: 1px solid #e2e8f0;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  transition: border-color 0.3s;
}
.q-card:hover { border-color: #cbd5e1; }
@media (max-width: 480px) { .q-card { padding: 22px 18px; } }

.q-badge {
  display: inline-block;
  background: linear-gradient(135deg, #06b6d4, #34d399);
  color: #fff; font-size: 11px; font-weight: 700;
  padding: 3px 10px; border-radius: 20px; margin-bottom: 12px;
}
.q-text { font-size: 16px; font-weight: 600; color: #0f172a; line-height: 1.5; margin-bottom: 4px; }
.q-hint { font-size: 13px; color: #94a3b8; font-style: italic; margin-bottom: 18px; }

/* ═══════════════════════════════════════
   OPTIONS (Radio & Checkbox)
   ═══════════════════════════════════════ */
.option-list { display: flex; flex-direction: column; gap: 8px; }

.opt-btn {
  display: flex; align-items: center; gap: 12px; width: 100%;
  padding: 14px 18px; border-radius: 12px; background: #fff;
  font-size: 15px; color: #334155; text-align: left;
  border: 1.5px solid #e2e8f0;
  transition: all 0.2s ease;
}
.opt-btn:hover { border-color: #94a3b8; }
.opt-btn.selected { border: 2px solid #06b6d4; background: #f0fdfa; }
.opt-btn.disabled { opacity: 0.45; cursor: not-allowed; }
.opt-btn.disabled:hover { border-color: #e2e8f0; }

.radio-dot {
  width: 20px; height: 20px; min-width: 20px; border-radius: 50%;
  border: 2px solid #cbd5e1; background: #fff;
  transition: all 0.2s ease;
}
.opt-btn.selected .radio-dot { border: 6px solid #06b6d4; }

.check-box {
  width: 20px; height: 20px; min-width: 20px; border-radius: 5px;
  border: 2px solid #cbd5e1; background: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: #fff;
  transition: all 0.2s ease;
}
.opt-btn.selected .check-box { border: none; background: #06b6d4; }

/* ═══════════════════════════════════════
   SCALE / LIKERT
   ═══════════════════════════════════════ */
.scale-item { margin-bottom: 22px; }
.scale-label { font-size: 14px; font-weight: 500; color: #475569; margin-bottom: 10px; }
.scale-buttons { display: flex; gap: 6px; flex-wrap: wrap; }
.scale-btn {
  flex: 1 1 0; min-width: 56px; padding: 10px 4px; border-radius: 10px;
  border: 1.5px solid #e2e8f0; background: #fff;
  font-size: 11px; color: #94a3b8; font-weight: 400;
  text-align: center; line-height: 1.3;
  transition: all 0.2s ease;
}
.scale-btn:hover { border-color: #94a3b8; }
.scale-btn.active { border: 2px solid #06b6d4; background: #f0fdfa; color: #0891b2; font-weight: 600; }
@media (max-width: 400px) { .scale-btn { min-width: 48px; font-size: 10px; padding: 8px 2px; } }

/* ═══════════════════════════════════════
   TEXT INPUTS
   ═══════════════════════════════════════ */
.other-input {
  width: 100%; padding: 12px 16px; margin-top: 8px; margin-left: 32px;
  width: calc(100% - 32px);
  border: 1.5px solid #e2e8f0; border-radius: 10px;
  font-size: 14px; color: #334155;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.other-input:focus { border-color: #06b6d4; box-shadow: 0 0 0 3px rgba(6,182,212,0.1); }

.open-textarea {
  width: 100%; padding: 16px; border: 1.5px solid #e2e8f0;
  border-radius: 12px; font-size: 15px; color: #334155;
  resize: vertical; min-height: 120px; line-height: 1.6;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.open-textarea:focus { border-color: #06b6d4; box-shadow: 0 0 0 3px rgba(6,182,212,0.1); }

.max-counter { font-size: 12px; color: #06b6d4; font-weight: 500; margin-bottom: 6px; }

/* ═══════════════════════════════════════
   NAVIGATION
   ═══════════════════════════════════════ */
.nav-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 32px; gap: 12px; }
.nav-bar.center { justify-content: center; }

/* ═══════════════════════════════════════
   THANK YOU PAGE
   ═══════════════════════════════════════ */
.thanks {
  text-align: center; padding-top: 80px;
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.thanks-emoji { font-size: 64px; margin-bottom: 20px; position: relative; }
.confetti { position: absolute; font-size: 20px; pointer-events: none; }
.confetti:nth-child(1) { top: -10px; left: -20px; animation: confetti1 1.2s ease-out forwards; }
.confetti:nth-child(2) { top: -5px; right: -20px; animation: confetti2 1.1s ease-out forwards; }
.confetti:nth-child(3) { top: 0; left: 10px; animation: confetti3 1.3s ease-out forwards; }
.confetti:nth-child(4) { top: -8px; right: 10px; animation: confetti4 1.15s ease-out forwards; }
.thanks h1 { font-family: 'Fraunces', serif; font-size: 32px; color: #0f172a; margin-bottom: 14px; }
.thanks p { font-size: 17px; color: #64748b; line-height: 1.7; max-width: 460px; }
.thanks .privacy-note { font-size: 14px; color: #94a3b8; font-style: italic; margin-top: 28px; }

/* ═══════════════════════════════════════
   ERROR TOAST
   ═══════════════════════════════════════ */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #ef4444; color: #fff; padding: 14px 28px; border-radius: 12px;
  font-size: 14px; font-weight: 500; z-index: 200;
  box-shadow: 0 8px 24px rgba(239,68,68,0.3);
  animation: fadeUp 0.3s ease;
}
</style>
</head>
<body>

<!-- ╔══════════════════════════════════════════╗
     ║  ALL CONTENT RENDERED BY JAVASCRIPT      ║
     ╚══════════════════════════════════════════╝ -->
<div id="app"></div>

<script>
// ═══════════════════════════════════════
//  CONFIGURATION — UPDATE THIS URL!
// ═══════════════════════════════════════
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxhaERBUPlwDsx5_m9qyV5CL0frxKgrnECREwPntl5P6ZS0upksUVfq7ZPpqXt7Q__s0w/exec";

// ═══════════════════════════════════════
//  SURVEY DATA
// ═══════════════════════════════════════
const SECTIONS = [
  {
    id: "intro", type: "intro",
    emoji: "💚",
    title: "Youth Mental Wellness Survey",
    subtitle: "Your voice matters. Help us understand what support young people actually need.",
    note: "This is completely anonymous. No right or wrong answers. Just be you."
  },
  {
    id: "about", emoji: "👋",
    title: "About You", subtitle: "Let's start with the basics",
    questions: [
      { id:"q1", num:1, text:"Which age group do you fall in?", type:"single",
        options:["13–14","15–16","17–18","19+"] },
      { id:"q2", num:2, text:"What gender do you identify with?",
        hint:"Select all that apply — this helps us understand who we're reaching",
        type:"multi", options:["Female","Male","Intersex","Non-binary / gender non-conforming","Prefer not to say"],
        hasOther:true, otherLabel:"Prefer to self-describe" },
      { id:"q3", num:3, text:"Which best describes your current situation?",
        hint:"Select all that apply — there's no wrong combination",
        type:"multi", options:["In high school","In college / university","Working full-time or part-time","Not currently in school or working","Student-athlete","Caregiver (for family members)"] }
    ]
  },
  {
    id: "feeling", emoji: "🫶",
    title: "How You've Been Feeling", subtitle: "No judgment here — just checking in",
    questions: [
      { id:"q4", num:4, text:"Over the past few weeks, how often have you experienced any of the following?",
        hint:"Be honest — there are no right or wrong answers", type:"scale",
        scaleLabels:["Never","Rarely","Sometimes","Often","Almost every day"],
        items:["Stress or feeling overwhelmed","Anxiety or excessive worry","Loneliness or social isolation","Low mood or sadness","Difficulty focusing or staying motivated","Burnout or emotional exhaustion","Pressure to perform (school, work, sports, family)"] },
      { id:"q5", num:5, text:"When you're going through a difficult time, what do you usually do to cope?",
        hint:"Select all that apply — there are no wrong answers", type:"multi",
        options:["Talk to a friend or peer","Talk to a family member","Exercise or physical activity","Creative outlets (art, music, writing)","Social media or online communities","Gaming or entertainment","Journaling or reflection","Meditation or breathing exercises","Wellness apps (meditation, journaling, etc.)","Nothing — I tend to keep it to myself"],
        hasOther:true }
    ]
  },
  {
    id: "support", emoji: "🤝",
    title: "Your Experience with Support", subtitle: "We want to understand what you've been through",
    questions: [
      { id:"q6", num:6, text:"Have you ever talked to a professional about your mental health — like a therapist, counselor, or psychiatrist?",
        type:"single", options:["Yes, and it was helpful","Yes, but it wasn't a great experience","I tried, but couldn't access it (cost, availability, stigma)","No, but I've wanted to","No, and I haven't felt the need to"] },
      { id:"q7", num:7, text:"What gets in the way of getting help when you need it?",
        hint:"Select all that apply", type:"multi",
        options:["Cost — I can't afford it","I don't know where to start or what's available","Fear of judgment or stigma","Lack of support from family or friends","It feels too formal or clinical","I don't want to be labeled or diagnosed","Long wait times or limited availability","I don't feel like my situation is \"bad enough\"","I'm not sure I can trust someone with my struggles","My culture or background discourages seeking help"],
        hasOther:true },
      { id:"q8", num:8, text:"How do you feel about the following statements?",
        hint:"Optional — rate each one honestly", type:"likert",
        likertLabels:["Strongly disagree","Disagree","Neutral","Agree","Strongly agree"],
        items:["I'd prefer support that doesn't feel like a doctor's appointment","I'd feel more comfortable talking to someone my age than a professional","I'm more likely to seek help if it's free or low-cost","I'd rather use an app or online resource than meet in person","I worry that getting help means something is \"wrong with me\"","I'd engage more if a trusted person in my life referred me"] }
    ]
  },
  {
    id: "want", emoji: "✨",
    title: "What You'd Actually Want", subtitle: "Dream it up — what would ideal support look like?",
    questions: [
      { id:"q9", num:9, text:"What type of mental wellness support sounds most appealing to you?",
        hint:"Pick your top 3", type:"multi", maxSelect:3,
        options:["One-on-one peer support or mentorship","Group conversations with peers","Workshops or skill-building sessions (stress, confidence, resilience)","Self-guided app or online tools","Text or chat-based support","Access to vetted resources and reading materials","Connection to professional help when needed"] },
      { id:"q10", num:10, text:"Where would you feel most comfortable accessing mental wellness support?",
        hint:"Select all that apply", type:"multi",
        options:["At school / on campus","At a community center","Online or via app (from home)","Through a dedicated youth wellness space","Via text or chat (no video or in-person required)","Through a trusted friend or peer referral"],
        hasOther:true },
      { id:"q11", num:11, text:"What would help you feel comfortable enough to actually open up?",
        hint:"Select all that apply", type:"multi",
        options:["Complete anonymity","Knowing the person has been through similar experiences","A judgment-free, non-clinical environment","Clear privacy and confidentiality policies","Being able to stop or opt out at any time","Cultural or identity representation in the people providing support"] }
    ]
  },
  {
    id: "engage", emoji: "📱",
    title: "How You Learn & Engage", subtitle: "Where do you actually spend your time?",
    questions: [
      { id:"q12", num:12, text:"Where do you go when you want to learn about mental health or wellness?",
        hint:"Select all that apply", type:"multi",
        options:["TikTok","Instagram","YouTube","Reddit or online forums","Podcasts","Websites or blogs","AI tools (ChatGPT, Snapchat AI, etc.)","Friends or word of mouth","School or academic resources","I don't actively seek this type of content"],
        hasOther:true },
      { id:"q13", num:13, text:"What kind of mental wellness content do you actually watch, read, or interact with?",
        hint:"Select all that apply", type:"multi",
        options:["Personal stories from people my age","Practical tips or how-tos (managing anxiety, sleep, stress)","Short-form videos or reels","Quizzes or self-assessments","Live Q&As or events","Memes or relatable content","Humor or lighthearted takes on serious topics","Inspiring or motivational content","I don't really engage with mental wellness content"] }
    ]
  },
  {
    id: "voice", emoji: "💬",
    title: "Your Voice", subtitle: "This is the most important part",
    questions: [
      { id:"q14", num:14,
        text:"If you could tell adults one thing about what young people actually need when it comes to mental wellness — what would it be?",
        hint:"Share anything on your mind. We're listening.", type:"open" }
    ]
  }
];

// ═══════════════════════════════════════
//  STATE
// ═══════════════════════════════════════
let page = 0;
let answers = {};
let otherTexts = {};
let submitting = false;
let submitted = false;
let toastTimeout = null;

// ═══════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════
const $ = (sel) => document.querySelector(sel);
const el = (tag, cls, html) => { const e = document.createElement(tag); if(cls) e.className = cls; if(html !== undefined) e.innerHTML = html; return e; };

function toggleMulti(qId, opt, maxSelect) {
  const current = answers[qId] || [];
  if (current.includes(opt)) {
    answers[qId] = current.filter(o => o !== opt);
  } else {
    if (maxSelect && current.length >= maxSelect) return;
    answers[qId] = [...current, opt];
  }
  render();
}

function showToast(msg) {
  const existing = $('.toast');
  if (existing) existing.remove();
  const t = el('div','toast', msg);
  document.body.appendChild(t);
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => t.remove(), 4000);
}

function navigate(dir) {
  const content = $('#content');
  if (content) {
    content.classList.remove('fade-up');
    content.classList.add('fade-out');
    setTimeout(() => { page += dir; render(); window.scrollTo(0,0); }, 280);
  } else {
    page += dir; render(); window.scrollTo(0,0);
  }
}

async function submitSurvey() {
  if (submitting) return;
  
  if (GOOGLE_SCRIPT_URL === "YOUR_GOOGLE_APPS_SCRIPT_URL_HERE") {
    // Demo mode — just show thank you
    submitted = true; render(); return;
  }
  
  submitting = true; render();
  
  const payload = { ...answers };
  // Attach other texts
  Object.keys(otherTexts).forEach(k => {
    if (otherTexts[k]) payload[k + "_other"] = otherTexts[k];
  });
  
  try {
    await fetch(GOOGLE_SCRIPT_URL, {
      method: "POST", mode: "no-cors",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify(payload)
    });
    submitted = true;
  } catch (err) {
    showToast("Something went wrong. Please try again.");
    console.error(err);
  }
  submitting = false;
  render();
}

// ═══════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════
function render() {
  const app = $('#app');
  app.innerHTML = '';
  
  // ── THANK YOU ──
  if (submitted) {
    const wrap = el('div','container');
    wrap.innerHTML = `
      <div class="thanks fade-up">
        <div class="thanks-emoji">
          💚
          <span class="confetti">🎉</span>
          <span class="confetti">✨</span>
          <span class="confetti">💛</span>
          <span class="confetti">🌟</span>
        </div>
        <h1>Thank you!</h1>
        <p>Your responses have been recorded. What you shared will directly help us build better mental wellness support for young people in our community.</p>
        <p class="privacy-note">Your answers are anonymous and will only be used for community planning.</p>
      </div>`;
    app.appendChild(wrap);
    return;
  }
  
  const section = SECTIONS[page];
  const totalSections = SECTIONS.length - 1;
  
  // ── PROGRESS BAR ──
  if (page > 0) {
    const prog = el('div','progress-wrap');
    const pct = (page / totalSections) * 100;
    prog.innerHTML = `
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-info"><span>Section ${page} of ${totalSections}</span><span>${Math.round(pct)}% complete</span></div>`;
    app.appendChild(prog);
  }
  
  const container = el('div','container');
  const content = el('div','fade-up');
  content.id = 'content';
  
  // ── INTRO PAGE ──
  if (page === 0) {
    content.innerHTML = `
      <div class="intro">
        <div class="intro-emoji">${section.emoji}</div>
        <h1>${section.title}</h1>
        <p class="subtitle">${section.subtitle}</p>
        <p class="note">${section.note}</p>
        <div class="info-card">
          <div class="info-row"><span>🔒</span><span>Your answers are <strong>completely anonymous</strong></span></div>
          <div class="info-row"><span>⏱️</span><span>Takes about <strong>8–10 minutes</strong></span></div>
          <div class="info-row"><span>💡</span><span>Your honesty helps us build support that <strong>actually works for you</strong></span></div>
        </div>
      </div>`;
    const nav = el('div','nav-bar center');
    const startBtn = el('button','btn-primary','Let\'s get started →');
    startBtn.onclick = () => navigate(1);
    nav.appendChild(startBtn);
    content.appendChild(nav);
  }
  
  // ── QUESTION PAGES ──
  if (page > 0 && section.questions) {
    // Section header
    const header = el('div','section-header');
    header.innerHTML = `
      <div class="section-emoji">${section.emoji}</div>
      <div class="section-title">${section.title}</div>
      <div class="section-subtitle">${section.subtitle}</div>`;
    content.appendChild(header);
    
    // Questions
    section.questions.forEach(q => {
      const card = el('div','q-card');
      let inner = `<div class="q-badge">Q${q.num}</div>`;
      inner += `<div class="q-text">${q.text}</div>`;
      if (q.hint) inner += `<div class="q-hint">${q.hint}</div>`;
      card.innerHTML = inner;
      
      // ── SINGLE SELECT ──
      if (q.type === 'single') {
        const list = el('div','option-list');
        q.options.forEach(opt => {
          const btn = el('button', `opt-btn${answers[q.id] === opt ? ' selected' : ''}`,
            `<div class="radio-dot"></div>${escHtml(opt)}`);
          btn.onclick = () => { answers[q.id] = opt; render(); };
          list.appendChild(btn);
        });
        card.appendChild(list);
      }
      
      // ── MULTI SELECT ──
      if (q.type === 'multi') {
        const sel = answers[q.id] || [];
        if (q.maxSelect) {
          const counter = el('div','max-counter', `${sel.length}/${q.maxSelect} selected`);
          card.appendChild(counter);
        }
        const list = el('div','option-list');
        q.options.forEach(opt => {
          const isSelected = sel.includes(opt);
          const isDisabled = q.maxSelect && sel.length >= q.maxSelect && !isSelected;
          const btn = el('button',
            `opt-btn${isSelected ? ' selected' : ''}${isDisabled ? ' disabled' : ''}`,
            `<div class="check-box">${isSelected ? '✓' : ''}</div>${escHtml(opt)}`);
          if (!isDisabled || isSelected) btn.onclick = () => toggleMulti(q.id, opt, q.maxSelect);
          list.appendChild(btn);
        });
        // "Other" option
        if (q.hasOther) {
          const isOtherSelected = sel.includes('__other__');
          const isDisabled = q.maxSelect && sel.length >= q.maxSelect && !isOtherSelected;
          const otherBtn = el('button',
            `opt-btn${isOtherSelected ? ' selected' : ''}${isDisabled ? ' disabled' : ''}`,
            `<div class="check-box">${isOtherSelected ? '✓' : ''}</div>${q.otherLabel || 'Other'}`);
          if (!isDisabled || isOtherSelected) otherBtn.onclick = () => toggleMulti(q.id, '__other__', q.maxSelect);
          list.appendChild(otherBtn);
          if (isOtherSelected) {
            const inp = el('input','other-input');
            inp.type = 'text'; inp.placeholder = 'Type your answer...';
            inp.value = otherTexts[q.id] || '';
            inp.oninput = (e) => { otherTexts[q.id] = e.target.value; };
            list.appendChild(inp);
          }
        }
        card.appendChild(list);
      }
      
      // ── SCALE ──
      if (q.type === 'scale') {
        const wrap = el('div','');
        q.items.forEach((item, idx) => {
          const row = el('div','scale-item');
          row.innerHTML = `<div class="scale-label">${escHtml(item)}</div>`;
          const btns = el('div','scale-buttons');
          q.scaleLabels.forEach((label, li) => {
            const b = el('button', `scale-btn${(answers[q.id]||{})[idx] === li ? ' active' : ''}`, escHtml(label));
            b.onclick = () => {
              if (!answers[q.id]) answers[q.id] = {};
              answers[q.id][idx] = li; render();
            };
            btns.appendChild(b);
          });
          row.appendChild(btns);
          wrap.appendChild(row);
        });
        card.appendChild(wrap);
      }
      
      // ── LIKERT ──
      if (q.type === 'likert') {
        const wrap = el('div','');
        q.items.forEach((item, idx) => {
          const row = el('div','scale-item');
          row.innerHTML = `<div class="scale-label">${escHtml(item)}</div>`;
          const btns = el('div','scale-buttons');
          q.likertLabels.forEach((label, li) => {
            const b = el('button', `scale-btn${(answers[q.id]||{})[idx] === li ? ' active' : ''}`, escHtml(label));
            b.onclick = () => {
              if (!answers[q.id]) answers[q.id] = {};
              answers[q.id][idx] = li; render();
            };
            btns.appendChild(b);
          });
          row.appendChild(btns);
          wrap.appendChild(row);
        });
        card.appendChild(wrap);
      }
      
      // ── OPEN-ENDED ──
      if (q.type === 'open') {
        const ta = el('textarea','open-textarea');
        ta.placeholder = "Type your thoughts here... Take your time.";
        ta.rows = 5;
        ta.value = answers[q.id] || '';
        ta.oninput = (e) => { answers[q.id] = e.target.value; };
        card.appendChild(ta);
      }
      
      content.appendChild(card);
    });
    
    // Navigation
    const nav = el('div','nav-bar');
    const backBtn = el('button','btn-secondary','← Back');
    backBtn.onclick = () => navigate(-1);
    nav.appendChild(backBtn);
    
    if (page < SECTIONS.length - 1) {
      const nextBtn = el('button','btn-primary','Next section →');
      nextBtn.onclick = () => navigate(1);
      nav.appendChild(nextBtn);
    } else {
      const submitBtn = el('button', `btn-submit${submitting ? ' loading' : ''}`,
        submitting ? 'Submitting...' : 'Submit my responses 💚');
      submitBtn.onclick = submitSurvey;
      nav.appendChild(submitBtn);
    }
    content.appendChild(nav);
  }
  
  container.appendChild(content);
  app.appendChild(container);
}

function escHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// ═══════════════════════════════════════
//  INIT
// ═══════════════════════════════════════
render();
</script>
</body>
</html>
